### Local dev only — not used in the Vercel + Neon deployment.
### Runs a plain Postgres plus a Neon-compatible HTTP proxy so the app's
### neon-http driver (src/db/index.ts) works without a Neon account.
### Start with:  docker compose -f docker-compose.local.yml up -d
services:
  postgres:
    image: postgres:16
    command: -c listen_addresses=*
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d main"]
      interval: 2s
      timeout: 2s
      retries: 15

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy
